# Local dev-parity stack for Omakase-Match (NOT a production deployment).
# Single entry point: http://localhost:8080 (NGINX) -> Vite + NestJS.
#
# Secrets: ANTHROPIC_API_KEY is read from your shell env or a gitignored
# root-level .env file. Never commit real keys.

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: omakase
      POSTGRES_PASSWORD: omakase
      POSTGRES_DB: omakase
    ports:
      - '5432:5432'
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U omakase -d omakase']
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    environment:
      NODE_ENV: development
      PORT: 3000
      # Inside the compose network the DB host is the service name, not localhost.
      DATABASE_URL: postgresql://omakase:omakase@db:5432/omakase
      # Pulled from host env / root .env — kept out of the repo.
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-claude-haiku-4-5}
    ports:
      - '3000:3000'
    volumes:
      - ./backend:/app
      # Keep the container's linux-native install; don't let the host shadow it.
      - /app/node_modules
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    environment:
      # Lets Vite's HMR websocket work when reached through NGINX on :8080.
      VITE_HMR_CLIENT_PORT: 8080
    ports:
      - '5173:5173'
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend

  nginx:
    image: nginx:1.27-alpine
    ports:
      - '8080:80'
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend

volumes:
  db-data:
