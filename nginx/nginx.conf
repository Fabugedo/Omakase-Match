# Reverse proxy for the local dev-parity stack.
# One origin (http://localhost:8080): API paths -> NestJS, everything else -> Vite.

events {}

http {
  upstream backend {
    server backend:3000;
  }
  upstream frontend {
    server frontend:5173;
  }

  server {
    listen 80;
    server_name localhost;

    # --- API routes (root-level paths from contracts/openapi.yaml) ---
    # If the API later gains a shared prefix, collapse these into one location.
    location ~ ^/(health|genres|anime|recommendations)(/|$) {
      proxy_pass http://backend;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    # --- Frontend (Vite dev server, including the HMR websocket) ---
    location / {
      proxy_pass http://frontend;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_set_header Host $host;
    }
  }
}
